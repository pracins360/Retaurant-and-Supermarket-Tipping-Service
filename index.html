<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Tip.me · Sentoo Tipping</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
      font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .app {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }

    .card {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 56px;
      padding: 28px 24px 40px;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35), 0 2px 6px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255,255,255,0.5);
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #1e2b3c, #0f3b2c);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-align: center;
      letter-spacing: -0.3px;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .sub {
      text-align: center;
      font-size: 16px;
      font-weight: 500;
      color: #2c5f4a;
      background: #e9f5ef;
      display: inline-block;
      width: auto;
      margin: 0 auto 18px;
      padding: 4px 16px;
      border-radius: 60px;
      letter-spacing: -0.2px;
    }

    /* Custom branded image section - easy to update in Canva */
    .branded-hero {
      margin: 20px 0 16px;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.15);
      transition: transform 0.2s ease;
    }

    .branded-hero img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 32px;
    }

    .worker-name {
      text-align: center;
      font-size: 26px;
      margin: 16px 0 0;
      font-weight: 900;
      letter-spacing: -0.5px;
      background: linear-gradient(145deg, #1f2f3a, #1e4a3b);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .job-title {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      color: #2c3e2f;
      margin-bottom: 28px;
      background: #ecfdf5;
      display: inline-block;
      width: auto;
      padding: 4px 20px;
      border-radius: 80px;
      margin-top: 4px;
    }

    label {
      font-weight: 600;
      font-size: 14px;
      color: #1e2a36;
      display: block;
      margin-top: 18px;
      margin-bottom: 6px;
      letter-spacing: -0.2px;
    }

    select, input, textarea {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      border-radius: 28px;
      border: 1.5px solid #e2e8f0;
      background: white;
      font-family: inherit;
      transition: all 0.2s;
      outline: none;
      color: #0f172a;
    }

    select:focus, input:focus, textarea:focus {
      border-color: #25d366;
      box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.2);
    }

    textarea {
      border-radius: 28px;
      resize: vertical;
      min-height: 85px;
    }

    .fee {
      font-size: 13px;
      color: #5b6e8c;
      text-align: right;
      margin: 12px 8px 0 0;
      font-weight: 500;
    }

    button {
      background: #25d366;
      width: 100%;
      border: none;
      padding: 16px 10px;
      font-size: 18px;
      font-weight: 700;
      color: white;
      border-radius: 60px;
      margin-top: 28px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 6px 14px rgba(37, 211, 102, 0.35);
    }

    button:hover {
      background: #1da958;
      transform: scale(0.98);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .tip-footer {
      margin-top: 26px;
      text-align: center;
      font-size: 12px;
      color: #4b5563;
      border-top: 1px solid #eef2ff;
      padding-top: 20px;
    }

    .brand-icon {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f1f5f9;
      padding: 6px 14px;
      border-radius: 40px;
    }

    .demo-badge {
      background: #fef3c7;
      color: #92400e;
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 30px;
      display: inline-block;
      margin-top: 8px;
      font-weight: 600;
    }

    @media (max-width: 480px) {
      .card {
        padding: 24px 18px 32px;
      }
      h1 {
        font-size: 28px;
      }
      .worker-name {
        font-size: 22px;
      }
    }

    /* Simple update notice */
    .update-note {
      text-align: center;
      font-size: 10px;
      color: #94a3b8;
      margin-top: 12px;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="card">
    <h1>Thank You <br>for your Tip</h1>
    <div style="text-align: center;">
      <p class="sub">💚 No cash? I have Sentoo. 💚</p>
    </div>

    <!-- =============================================================== -->
    <!-- BRANDED HERO IMAGE - UPDATE THIS URL WHEN YOU CHANGE IN CANVA -->
    <!-- Just replace the src URL with your new Canva image link -->
    <!-- =============================================================== -->
    <div class="branded-hero">
      <img src="https://i.ibb.co/v6nqkx9K/tipping-service.jpg" alt="Sentoo Tipping Service | Purcy" border="0">
    </div>

    <h2 class="worker-name">Purcy</h2>
    <p class="job-title">✨ Job Waiter ✨</p>

    <!-- Standard tip amount dropdown -->
    <label>💎 Standard tip amount</label>
    <select id="amount">
      <option value="5">XCG 5</option>
      <option value="8" selected>XCG 8</option>
      <option value="10">XCG 10</option>
      <option value="15">XCG 15</option>
      <option value="20">XCG 20</option>
    </select>

    <!-- Other amount optional -->
    <label>💰 Other amount (optional)</label>
    <input id="otherAmount" type="number" placeholder="Example: 37" step="1" min="1">

    <!-- Description field -->
    <label>📝 Description</label>
    <textarea id="description" placeholder="Thank you for your service.">Exceptional service, great atmosphere!</textarea>

    <div class="fee">⏱️ 3% service fee applies | Powered by Sentoo</div>

    <!-- Send WhatsApp button -->
    <button onclick="sendTip()">
      <span>📱</span> Send WhatsApp Tip
    </button>

    <div class="tip-footer">
      <div class="brand-icon">
        <span>✨</span> <span>Sentoo · Instant Tipping</span>
      </div>
      <div class="update-note">
        🎨 Update your branding in Canva → replace image URL above
      </div>
      <div class="demo-badge">
        ⚡ GitHub Demo Mode · Ready for Apps Script
      </div>
    </div>
  </div>
</div>

<script>
  // ======================== CONFIGURATION ==========================
  // 🔧 GITHUB DEMO MODE: Apps Script integration is DISABLED by default
  // 
  // 📌 TO UPDATE YOUR BRANDING IMAGE:
  //    1. Design in Canva with Sentoo logo, worker photo, name, etc.
  //    2. Generate image URL (ImgBB or other hosting)
  //    3. Replace the src in the <img> tag above (line ~128)
  //
  // 📌 TO CONNECT APPS SCRIPT LATER:
  //    1. Deploy your GS script as Web App
  //    2. Copy the URL and paste below
  //    3. Change ENABLE_APPS_SCRIPT to true
  // ================================================================
  
  const ENABLE_APPS_SCRIPT = false;  // Set to true when you have Apps Script URL
  const API_URL = "";  // Paste your Apps Script URL here: "https://script.google.com/macros/s/.../exec"
  
  // WhatsApp number
  const WHATSAPP = "59995120536";
  
  // Worker name (can also be embedded in your Canva image)
  const WORKER_NAME = "Purcy";
  
  // Function to send tip
  async function sendTip() {
    // Get selected standard tip value
    const standardSelect = document.getElementById("amount");
    const standardValue = standardSelect.value;
    
    // Get other amount field
    const otherInput = document.getElementById("otherAmount");
    let otherAmountRaw = otherInput.value.trim();
    
    let finalAmount = "";
    
    // Validation
    if (otherAmountRaw !== "") {
      const parsedOther = parseFloat(otherAmountRaw);
      if (!isNaN(parsedOther) && parsedOther > 0) {
        finalAmount = parsedOther.toString();
      } else {
        alert("⚠️ Invalid custom amount. Using standard tip instead.");
        finalAmount = standardValue;
      }
    } else {
      finalAmount = standardValue;
    }
    
    if (!finalAmount || parseFloat(finalAmount) <= 0) {
      alert("Please select a valid tip amount (minimum 1 XCG).");
      return;
    }
    
    // Get description
    let descriptionField = document.getElementById("description").value.trim();
    if (descriptionField === "") {
      descriptionField = "Thank you for your service.";
    }
    
    // Build data object for Apps Script
    const tipData = {
      worker: WORKER_NAME,
      amount: "XCG " + finalAmount,
      description: descriptionField,
      feePercent: 3
    };
    
    // Call Apps Script if enabled
    if (ENABLE_APPS_SCRIPT && API_URL && API_URL !== "") {
      try {
        const response = await fetch(API_URL, {
          method: "POST",
          mode: "cors",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(tipData)
        });
        
        if (response.ok) {
          const result = await response.json();
          if (result && result.ok === true) {
            console.log("✅ Tip logged to Google Sheets");
          }
        } else {
          console.error("❌ HTTP error:", response.status);
        }
      } catch (err) {
        console.error("❌ Error saving to Sheets:", err);
      }
    } else {
      console.log("📝 Demo Mode - Tip data:", tipData);
    }
    
    // Prepare WhatsApp message
    const msg = 
      "Hi, I want to tip.\n\n" +
      "Worker: " + WORKER_NAME + "\n" +
      "Tip Amount: XCG " + finalAmount + "\n" +
      "Description: " + descriptionField + "\n\n" +
      "Please send me the Sentoo payment link.";
    
    // Redirect to WhatsApp
    const whatsappUrl = "https://wa.me/" + WHATSAPP + "?text=" + encodeURIComponent(msg);
    window.location.href = whatsappUrl;
  }
  
  console.log("🎉 Tip.me ready - Update your Canva image anytime!");
</script>
</body>
</html>
