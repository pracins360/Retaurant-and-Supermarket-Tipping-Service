
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tip.me</title>
  <style>
    .profile-row{
  display:flex;
  justify-content:center;
  align-items:center;
  margin:18px 0 8px;
}

.main-photo{
  width:125px;
  height:125px;
  border-radius:50%;
  object-fit:cover;
  border:5px solid #25d366;
  z-index:2;
}

.side-photo{
  width:52px;
  height:52px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #111;
  margin:0 -6px;
  background:white;
}

.blur{
  filter:blur(1.5px);
  opacity:.55;
}

.avatar{
  opacity:.85;
}

.worker-name{
  text-align:center;
  font-size:22px;
  margin:4px 0 0;
  font-weight:900;
}

.job-title{
  text-align:center;
  font-size:18px;
  font-weight:800;
  color:#111;
  margin-bottom:14px;
}
  </style>
</head>
<body>
<div class="app">
  <div class="card">
    <h1>Thank You <br>for your Tip</h1>
<p class="sub">No cash? I have Sentoo.</p>

<div class="profile-row">
  <img class="side-photo blur" src="<img src="https://www.image2url.com/r2/default/images/1780543087610-318f611c-a716-499f-aa3e-9c4130b5cc80.avif" alt="image" />">
  <img class="side-photo avatar" src="<img src="https://www.image2url.com/r2/default/images/1780543167318-79487051-d0dd-419b-b95d-c1abe191bc6c.webp" alt="image" />">
  <img class="main-photo" src="<img src="https://www.image2url.com/r2/default/images/1780542622867-aa731ce5-9508-4f04-a3f5-f7523124d79e.jpeg" alt="image" />">
  <img class="side-photo avatar" src="<img src="https://www.image2url.com/r2/default/images/1780543167318-79487051-d0dd-419b-b95d-c1abe191bc6c.webp" alt="image" />">
  <img class="side-photo blur" src="<img src="https://www.image2url.com/r2/default/images/1780543087610-318f611c-a716-499f-aa3e-9c4130b5cc80.avif" alt="image" />">
</div>

<h2 class="worker-name">Purcy</h2>
<p class="job-title">Job Waiter</p>

       <label>Standard tip amount</label>
    <select id="amount">
      <option value="5">XCG 5</option>
      <option value="8">XCG 8</option>
      <option value="10">XCG 10</option>
      <option value="15">XCG 15</option>
      <option value="20">XCG 20</option>
    </select>

    <label>Other amount optional</label>
    <input id="otherAmount" type="number" placeholder="Example: 37">

    <label>Description</label>
    <textarea id="description" placeholder="Thank you for your service."></textarea>

    <div class="fee">3% service fee applies</div>

    <button onclick="sendTip()">Send WhatsApp</button>
  </div>
</div>

<script>
const API_URL = "PASTE_APPS_SCRIPT_WEB_APP_URL_HERE";
const WHATSAPP = "59995120536";

function sendTip(){
  const worker = document.getElementById("workerName").value.trim();
  const standard = document.getElementById("amount").value;
  const other = document.getElementById("otherAmount").value.trim();
  const description = document.getElementById("description").value.trim() || "Thank you for your service.";
  const finalAmount = other || standard;

  if(!worker){
    alert("Please enter worker name.");
    return;
  }

  const data = {
    worker,
    amount: "XCG " + finalAmount,
    description,
    feePercent: 3
  };

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  }).catch(err => console.log(err));

  const msg =
    "Hi, I want to tip.\n\n" +
    "Worker: " + worker + "\n" +
    "Tip Amount: XCG " + finalAmount + "\n" +
    "Description: " + description + "\n\n" +
    "Please send me the Sentoo payment link.";

  window.location.href = "https://wa.me/" + WHATSAPP + "?text=" + encodeURIComponent(msg);
}
</script>
</body>
</html>
