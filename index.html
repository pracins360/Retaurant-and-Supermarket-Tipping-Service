
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tip.me</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#f4f7fb;color:#102033}
    .app{max-width:480px;margin:auto;padding:16px}
    .card{background:white;border-radius:24px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
    h1{text-align:center;margin:0 0 6px}
    .sub{text-align:center;color:#66778d}
    .photo{width:180px;height:180px;border-radius:50%;object-fit:cover;display:block;margin:20px auto;border:6px solid #25d366}
    label{display:block;margin-top:16px;font-weight:800}
    input,select,textarea{width:100%;padding:15px;border-radius:15px;border:1px solid #d7dfeb;font-size:17px;box-sizing:border-box;margin-top:8px}
    textarea{min-height:80px}
    button{width:100%;padding:18px;border:none;border-radius:999px;background:#25d366;color:white;font-weight:900;font-size:18px;margin-top:20px}
    .fee{background:#fff4cc;padding:12px;border-radius:14px;margin-top:16px;font-weight:700;text-align:center}
  </style>
</head>
<body>
<div class="app">
  <div class="card">
    <h1>Thank you for your Tip</h1>
    <p class="sub">No cash? I have Sentoo.</p>

    <img class="photo" src="<a href="<a href=" ">

    <label>Worker name</label>
    <input id="workerName" placeholder="Example: David">

    <label>Standard tip amount</label>
    <select id="amount">
      <option value="5">XCG 5</option>
      <option value="8">XCG 8</option>
      <option value="10">XCG 10</option>
      <option value="15">XCG 15</option>
      <option value="20">XCG 20</option>
    </select>

    <label>Other amount optional</label>
    <input id="otherAmount" type="number" placeholder="Example: 37">

    <label>Description</label>
    <textarea id="description" placeholder="Thank you for your service."></textarea>

    <div class="fee">3% service fee applies</div>

    <button onclick="sendTip()">Send WhatsApp</button>
  </div>
</div>

<script>
const API_URL = "PASTE_APPS_SCRIPT_WEB_APP_URL_HERE";
const WHATSAPP = "59995120536";

function sendTip(){
  const worker = document.getElementById("workerName").value.trim();
  const standard = document.getElementById("amount").value;
  const other = document.getElementById("otherAmount").value.trim();
  const description = document.getElementById("description").value.trim() || "Thank you for your service.";
  const finalAmount = other || standard;

  if(!worker){
    alert("Please enter worker name.");
    return;
  }

  const data = {
    worker,
    amount: "XCG " + finalAmount,
    description,
    feePercent: 3
  };

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  }).catch(err => console.log(err));

  const msg =
    "Hi, I want to tip.\n\n" +
    "Worker: " + worker + "\n" +
    "Tip Amount: XCG " + finalAmount + "\n" +
    "Description: " + description + "\n\n" +
    "Please send me the Sentoo payment link.";

  window.location.href = "https://wa.me/" + WHATSAPP + "?text=" + encodeURIComponent(msg);
}
</script>
</body>
</html>
