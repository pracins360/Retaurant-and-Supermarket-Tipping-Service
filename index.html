<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Tip.me · Sentoo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
      font-family: system-ui, 'Segoe UI', 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .app { width: 100%; max-width: 500px; margin: 0 auto; }
    .card {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 48px;
      padding: 28px 24px 40px;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255,255,255,0.5);
    }
    .sub {
      text-align: center;
      font-size: 16px;
      font-weight: 500;
      color: #2c5f4a;
      background: #e9f5ef;
      display: inline-block;
      width: auto;
      margin: 0 auto 20px;
      padding: 4px 16px;
      border-radius: 60px;
    }
    .branded-hero {
      margin: 8px 0 24px;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.15);
    }
    .branded-hero img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 32px;
    }
    label { font-weight: 600; font-size: 14px; color: #1e2a36; display: block; margin-top: 18px; margin-bottom: 6px; }
    select, input, textarea {
      width: 100%; padding: 14px 16px; font-size: 16px; border-radius: 28px;
      border: 1.5px solid #e2e8f0; background: white; font-family: inherit;
      transition: all 0.2s; outline: none;
    }
    select:focus, input:focus, textarea:focus { border-color: #25d366; box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.2); }
    textarea { border-radius: 28px; resize: vertical; min-height: 85px; }
    .fee { font-size: 13px; color: #5b6e8c; text-align: right; margin: 12px 8px 0 0; }
    button {
      background: #25d366; width: 100%; border: none; padding: 16px 10px;
      font-size: 18px; font-weight: 700; color: white; border-radius: 60px;
      margin-top: 28px; cursor: pointer; transition: 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 6px 14px rgba(37, 211, 102, 0.35);
    }
    button:hover { background: #1da958; transform: scale(0.98); }
    .footer { margin-top: 24px; text-align: center; font-size: 11px; color: #94a3b8; }
    @media (max-width: 480px) { .card { padding: 24px 18px 32px; } }
  </style>
</head>
<body>
<div class="app">
  <div class="card">
    <div style="text-align: center;">
      <p class="sub">💚 No cash? I have Sentoo 💚</p>
    </div>

    <!-- Image loads dynamically based on URL parameter -->
    <div class="branded-hero">
      <img id="userImage" src="" alt="Sentoo Tipping" border="0">
    </div>

    <label>💎 Standard tip amount</label>
    <select id="amount">
      <option value="5">XCG 5</option>
      <option value="8" selected>XCG 8</option>
      <option value="10">XCG 10</option>
      <option value="15">XCG 15</option>
      <option value="20">XCG 20</option>
    </select>

    <label>💰 Other amount (optional)</label>
    <input id="otherAmount" type="number" placeholder="Example: 37" step="1" min="1">

    <label>📝 Description</label>
    <textarea id="description" placeholder="Thank you for your service.">Exceptional service, great atmosphere!</textarea>

    <div class="fee">⏱️ 3% service fee applies · Powered by Sentoo</div>

    <button onclick="sendTip()">
      <span>📱</span> Send WhatsApp Tip
    </button>

    <div class="footer">
      Update design in Canva → replace image URL in your user list
    </div>
  </div>
</div>

<script>
  // ======================== USER DATABASE ==========================
  // Add each user here with their unique image URL and WhatsApp number
  const USERS = {
    "purcy": {
      imageUrl: "https://i.ibb.co/v6nqkx9K/tipping-service.jpg",
      whatsapp: "59995120536",
      workerName: "Purcy"
    },
    "maria": {
      imageUrl: "https://i.ibb.co/YOUR_MARIA_IMAGE.jpg",
      whatsapp: "59995120537",
      workerName: "Maria"
    },
    "john": {
      imageUrl: "https://i.ibb.co/YOUR_JOHN_IMAGE.jpg",
      whatsapp: "59995120538",
      workerName: "John"
    }
    // Add more users here as needed
  };
  
  // Get user from URL parameter: ?user=purcy
  const urlParams = new URLSearchParams(window.location.search);
  const userId = urlParams.get('user') || "purcy"; // Default to purcy
  
  // Load user data
  const currentUser = USERS[userId] || USERS["purcy"];
  
  // Set the image
  document.getElementById("userImage").src = currentUser.imageUrl;
  
  // Config for this user
  const WHATSAPP = currentUser.whatsapp;
  const WORKER_NAME = currentUser.workerName;
  
  // Apps Script config (same for all users)
  const ENABLE_APPS_SCRIPT = false;
  const API_URL = "";
  
  console.log(`Loaded user: ${WORKER_NAME} (${userId})`);
  
  async function sendTip() {
    const standardSelect = document.getElementById("amount");
    const standardValue = standardSelect.value;
    
    const otherInput = document.getElementById("otherAmount");
    let otherAmountRaw = otherInput.value.trim();
    
    let finalAmount = "";
    
    if (otherAmountRaw !== "") {
      const parsedOther = parseFloat(otherAmountRaw);
      if (!isNaN(parsedOther) && parsedOther > 0) {
        finalAmount = parsedOther.toString();
      } else {
        alert("⚠️ Invalid custom amount. Using standard tip.");
        finalAmount = standardValue;
      }
    } else {
      finalAmount = standardValue;
    }
    
    if (!finalAmount || parseFloat(finalAmount) <= 0) {
      alert("Please select a valid tip amount.");
      return;
    }
    
    let descriptionField = document.getElementById("description").value.trim();
    if (descriptionField === "") {
      descriptionField = "Thank you for your service.";
    }
    
    const tipData = {
      worker: WORKER_NAME,
      amount: "XCG " + finalAmount,
      description: descriptionField,
      feePercent: 3
    };
    
    if (ENABLE_APPS_SCRIPT && API_URL && API_URL !== "") {
      try {
        await fetch(API_URL, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(tipData)
        });
        console.log("✅ Tip logged to Sheets");
      } catch (err) {
        console.error("❌ Error:", err);
      }
    } else {
      console.log("📝 Demo Mode - Tip:", tipData);
    }
    
    const msg = "Hi, I want to tip.\n\n" +
      "Worker: " + WORKER_NAME + "\n" +
      "Tip Amount: XCG " + finalAmount + "\n" +
      "Description: " + descriptionField + "\n\n" +
      "Please send me the Sentoo payment link.";
    
    window.location.href = "https://wa.me/" + WHATSAPP + "?text=" + encodeURIComponent(msg);
  }
</script>
</body>
</html>
