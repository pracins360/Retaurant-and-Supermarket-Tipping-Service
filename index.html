<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Tip.me · Sentoo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
    }

    /* Main Card */
    .card {
      background: white;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    /* Banner Image - REPLACED with your new URL */
    .banner {
      width: 100%;
      height: auto;
      display: block;
    }

    .banner img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Content Area */
    .content {
      padding: 24px 20px 32px;
    }

    /* Header Badge */
    .badge {
      background: #e8f5e9;
      color: #2e7d32;
      display: inline-block;
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
      width: auto;
    }

    /* Title Section */
    .title-section {
      margin-bottom: 24px;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      font-weight: 500;
    }

    /* Standard Amounts Label */
    .section-label {
      font-weight: 700;
      color: #333;
      margin-bottom: 12px;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::before {
      content: "💎";
      font-size: 18px;
    }

    /* Tip Grid Buttons */
    .tip-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .tip-btn {
      background: #f5f5f5;
      border: 2px solid #e0e0e0;
      padding: 14px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 700;
      color: #333;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .tip-btn:hover {
      background: #667eea;
      border-color: #667eea;
      color: white;
      transform: translateY(-2px);
    }

    .tip-btn.other-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-color: transparent;
      color: white;
    }

    /* Other Amount Input */
    .other-amount-container {
      margin-bottom: 20px;
    }

    .other-input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 16px;
      font-size: 16px;
      font-family: inherit;
      transition: all 0.2s;
      outline: none;
    }

    .other-input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .other-input::placeholder {
      color: #999;
    }

    /* Description */
    .description-label {
      font-weight: 700;
      color: #333;
      margin-bottom: 12px;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .description-label::before {
      content: "📝";
      font-size: 18px;
    }

    textarea {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 16px;
      font-size: 15px;
      font-family: inherit;
      resize: vertical;
      min-height: 90px;
      transition: all 0.2s;
      outline: none;
      margin-bottom: 20px;
    }

    textarea:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    /* Send Button */
    .send-btn {
      width: 100%;
      background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
      border: none;
      padding: 16px;
      border-radius: 60px;
      font-size: 18px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .send-btn:hover {
      transform: scale(0.98);
      box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
    }

    /* Footer */
    .footer {
      text-align: center;
      color: #999;
      font-size: 11px;
      padding-top: 16px;
      border-top: 1px solid #f0f0f0;
    }

    /* User Badge */
    .user-badge {
      text-align: center;
      font-size: 13px;
      color: #667eea;
      font-weight: 600;
      margin-top: 12px;
      padding: 8px;
      background: #f5f3ff;
      border-radius: 12px;
    }

    /* QR Overlay (hidden in this design, keeping for Phase 2) */
    .qr-overlay {
      display: none;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .content {
        padding: 20px 16px 28px;
      }
      
      .tip-btn {
        padding: 12px;
        font-size: 16px;
      }
      
      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <!-- Banner Image - UPDATED with your exact URL: https://i.ibb.co/20JjwRrP/tipme-banner.png -->
    <div class="banner">
      <img src="https://i.ibb.co/20JjwRrP/tipme-banner.png" alt="Tip.me Service - Tips Made Simple">
    </div>

    <div class="content">
      <!-- Badge -->
      <div style="text-align: center;">
        <div class="badge">💚 No cash? I have Sentoo 💚</div>
      </div>

      <!-- Title Section matching your UI description -->
      <div class="title-section" style="text-align: center;">
        <h1>TIP.ME</h1>
        <div class="subtitle">TIPS MADE SIMPLE</div>
        <div class="subtitle" style="font-size: 12px; color: #999; margin-top: 6px;">Support great service. Enjoy.</div>
      </div>

      <!-- STANDARD AMOUNTS section exactly as you requested -->
      <div class="section-label">STANDARD AMOUNTS</div>

      <!-- Tip Grid with ALL required buttons: 5,10,15,20,25,30,50,Other -->
      <div class="tip-grid">
        <button class="tip-btn" data-tip="5">5</button>
        <button class="tip-btn" data-tip="10">10</button>
        <button class="tip-btn" data-tip="15">15</button>
        <button class="tip-btn" data-tip="20">20</button>
        <button class="tip-btn" data-tip="25">25</button>
        <button class="tip-btn" data-tip="30">30</button>
        <button class="tip-btn" data-tip="50">50</button>
        <button class="tip-btn other-btn" id="otherStandardBtn">Other</button>
      </div>

      <!-- Other Amount Input (hidden by default, appears when 'Other' is clicked) -->
      <div class="other-amount-container" id="otherAmountContainer" style="display: none;">
        <input type="number" id="otherAmount" class="other-input" placeholder="Enter custom amount (XCG)" min="1" step="1">
      </div>

      <!-- Description field matches your UI: "Description" with pre-filled text -->
      <div class="description-label">Description</div>
      <textarea id="description" placeholder="Add a personal message...">Exceptional service, great atmosphere!</textarea>

      <!-- Send WhatsApp Tip Button -->
      <button class="send-btn" id="sendWhatsAppBtn">
        <span>📱</span> Send WhatsApp Tip
      </button>

      <!-- Footer with helper text -->
      <div class="footer">
        Tap button → WhatsApp message → Receive Sentoo payment link
      </div>

      <!-- Dynamic user badge (supports multiple staff: ?user=purcy or ?user=david) -->
      <div id="userBadge" class="user-badge"></div>
    </div>
  </div>
</div>

<script>
  // ======================== USER DATABASE ==========================
  // Each team member gets their own WhatsApp number and Sentoo payment links
  const USERS = {
    "purcy": {
      whatsapp: "59995120536",
      workerName: "Purcy",
      sentooLinks: {
        5: "https://pay.sentoo.me/p/a6a1455f-37bf-4e32-803e-b710d32654b9",
        8: "https://pay.sentoo.me/p/5b756cf0-c5f6-408f-bda8-8fecd500e467",
        10: "https://pay.sentoo.me/p/5b756cf0-c5f6-408f-bda8-8fecd500e467",
        12: "https://pay.sentoo.me/p/03b1ea97-cd4d-4e21-83a3-c06d5a9d0095",
        15: "https://pay.sentoo.me/p/fb0d2c2d-7299-405f-bfbc-f41c12215c14",
        18: "https://pay.sentoo.me/p/e5e205ca-cfcd-445d-b19a-81b8c7a15c74",
        20: "https://pay.sentoo.me/p/7e6b238c-668f-4c48-b3a9-7601ddd31999",
        25: "https://pay.sentoo.me/p/bb0d1c54-b79e-4651-bc5a-aeb13ef675ce",
        30: "https://pay.sentoo.me/p/6d3f53ca-6637-4d6b-9bad-eb713ea01b20",
        50: "https://pay.sentoo.me/p/a2ffb521-80d7-4746-9398-148eae85a03c"
      }
    },
    "david": {
      whatsapp: "59995120537",
      workerName: "David",
      sentooLinks: {
        5: "https://pay.sentoo.me/p/david_5_link",
        8: "https://pay.sentoo.me/p/david_8_link",
        10: "https://pay.sentoo.me/p/david_10_link",
        12: "https://pay.sentoo.me/p/david_12_link",
        15: "https://pay.sentoo.me/p/david_15_link",
        18: "https://pay.sentoo.me/p/david_18_link",
        20: "https://pay.sentoo.me/p/david_20_link",
        25: "https://pay.sentoo.me/p/david_25_link",
        30: "https://pay.sentoo.me/p/david_30_link",
        50: "https://pay.sentoo.me/p/david_50_link"
      }
    }
    // ➕ Add more team members here following the same pattern
  };

  // Get user from URL parameter: ?user=purcy  or  ?user=david
  const urlParams = new URLSearchParams(window.location.search);
  let userId = urlParams.get('user');
  if (!userId || !USERS[userId.toLowerCase()]) {
    userId = "purcy";   // Default user if none specified or invalid
  } else {
    userId = userId.toLowerCase();
  }
  const activeUser = USERS[userId];

  // Display the correct worker name in the badge
  document.getElementById("userBadge").innerHTML = `✨ Tipping ${activeUser.workerName} ✨`;
  document.title = `Tip ${activeUser.workerName} · Tip.me`;

  // Helper: get the Sentoo payment link for a given amount
  function getSentooLink(amount) {
    const numAmount = Number(amount);
    if (activeUser.sentooLinks && activeUser.sentooLinks[numAmount]) {
      return activeUser.sentooLinks[numAmount];
    }
    // Friendly alert for missing custom link (should not happen for standard amounts)
    console.warn(`No Sentoo link configured for amount ${amount}`);
    return null;
  }

  // DIRECT PAYMENT: When user clicks a standard tip button (5,10,15,20,25,30,50)
  document.querySelectorAll('.tip-btn[data-tip]').forEach(btn => {
    btn.addEventListener('click', () => {
      const amount = btn.getAttribute('data-tip');
      const link = getSentooLink(amount);
      if (link) {
        // Redirect directly to Sentoo payment page
        window.location.href = link;
      } else {
        alert(`⚠️ Sentoo payment link for XCG ${amount} is not configured yet. Please use the WhatsApp option.`);
      }
    });
  });

  // "Other" button logic: show/hide custom amount input
  const otherStandardBtn = document.getElementById('otherStandardBtn');
  const otherAmountContainer = document.getElementById('otherAmountContainer');
  const otherAmountInput = document.getElementById('otherAmount');

  otherStandardBtn.addEventListener('click', () => {
    if (otherAmountContainer.style.display === 'none') {
      otherAmountContainer.style.display = 'block';
      otherAmountInput.focus();
    } else {
      otherAmountContainer.style.display = 'none';
      otherAmountInput.value = '';
    }
  });

  // ========== PHASE 2: GOOGLE APPS SCRIPT INTEGRATION (ready for future) ==========
  const ENABLE_APPS_SCRIPT = false;  // ← Set to true when you deploy Apps Script
  const APPS_SCRIPT_URL = "";        // ← Paste your Google Apps Script Web App URL here

  // Optional: log tip requests to Google Sheets (disabled by default for GitHub)
  async function logToSheets(tipData) {
    if (!ENABLE_APPS_SCRIPT || !APPS_SCRIPT_URL) {
      console.log("📊 Google Sheets logging ready (Phase 2). Set ENABLE_APPS_SCRIPT=true and add APPS_SCRIPT_URL");
      return;
    }
    try {
      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(tipData)
      });
      console.log("✅ Tip request logged to Google Sheets");
    } catch (err) {
      console.error("❌ Sheet logging error:", err);
    }
  }

  // WHATSAPP TIP REQUEST: send message to the staff member asking for payment link
  async function sendWhatsAppTip() {
    let finalAmount = null;
    
    // Check if "Other" amount is active and filled
    if (otherAmountContainer.style.display === 'block' && otherAmountInput.value) {
      const customAmount = parseFloat(otherAmountInput.value);
      if (!isNaN(customAmount) && customAmount > 0) {
        finalAmount = customAmount;
      } else {
        alert("⚠️ Please enter a valid custom amount (positive number).");
        return;
      }
    } else {
      // No custom amount selected: prompt user to choose a standard button OR use Other
      alert("💎 Please select a tip amount:\n• Tap any standard button (5,10,15,20,25,30,50) for direct payment\n• Or click 'Other' to enter a custom amount and request via WhatsApp");
      return;
    }
    
    // Get description from textarea
    let description = document.getElementById("description").value.trim();
    if (description === "") {
      description = "Thank you for your service!";
    }
    
    // Prepare data for potential Google Sheets logging
    const tipRecord = {
      worker: activeUser.workerName,
      amount: "XCG " + finalAmount,
      description: description,
      feePercent: 3,
      userId: userId,
      timestamp: new Date().toISOString(),
      type: "whatsapp_request"
    };
    
    // Log to Sheets if Phase 2 is enabled
    await logToSheets(tipRecord);
    
    // Build WhatsApp message for the worker: they will reply with a payment link
    const message = `${activeUser.workerName} | XCG ${finalAmount} | ${description} | Please send me a Sentoo payment link. Thank you!`;
    const whatsappUrl = `https://wa.me/${activeUser.whatsapp}?text=${encodeURIComponent(message)}`;
    
    console.log("📱 Opening WhatsApp with payment request");
    window.open(whatsappUrl, '_blank');
  }
  
  // Attach WhatsApp button event listener
  document.getElementById("sendWhatsAppBtn").addEventListener("click", sendWhatsAppTip);
  
  // Optional: allow Enter key in custom amount field to trigger WhatsApp request
  if (otherAmountInput) {
    otherAmountInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendWhatsAppTip();
      }
    });
  }
</script>

<!-- 
  ════════════════════════════════════════════════════════════════
  GOOGLE APPS SCRIPT CODE (code.gs) - FULLY PRESERVED FOR PHASE 2
  ════════════════════════════════════════════════════════════════
  
  Copy this function into your Google Apps Script project (Extensions → Apps Script)
  Then deploy as Web App and set ENABLE_APPS_SCRIPT = true + APPS_SCRIPT_URL.
  
  function doPost(e) {
    try {
      const data = JSON.parse(e.postData.contents);
      const ss = SpreadsheetApp.getActiveSpreadsheet();
      let sheet = ss.getSheetByName("tips");
      
      if (!sheet) {
        sheet = ss.insertSheet("tips");
      }
      
      if (sheet.getLastRow() === 0) {
        sheet.appendRow([
          "Date", "Worker", "Amount", "Description", 
          "Fee %", "Status", "Payout Status", "User ID", "Timestamp", "Type"
        ]);
      }
      
      sheet.appendRow([
        new Date(),
        data.worker,
        data.amount,
        data.description,
        data.feePercent || 3,
        "Payment Requested",
        "Not Paid Out",
        data.userId || "",
        data.timestamp || new Date().toISOString(),
        data.type || "whatsapp_request"
      ]);
      
      return ContentService
        .createTextOutput(JSON.stringify({ success: true }))
        .setMimeType(ContentService.MimeType.JSON);
        
    } catch(error) {
      return ContentService
        .createTextOutput(JSON.stringify({ success: false, error: error.toString() }))
        .setMimeType(ContentService.MimeType.JSON);
    }
  }
  
  📌 DEPLOYMENT STEPS FOR PHASE 2:
  1. Create a Google Sheet
  2. Go to Extensions → Apps Script
  3. Paste the doPost() function above
  4. Click Deploy → New deployment → Web app
  5. Execute as: "Me", Who has access: "Anyone"
  6. Copy the deployment URL
  7. In this HTML, set: ENABLE_APPS_SCRIPT = true and paste URL as APPS_SCRIPT_URL
-->
</body>
</html>
